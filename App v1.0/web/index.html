<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>X-Ray Bone Fracture Detection</title>

<script type="text/javascript" src="/eel.js"></script>

<style>

body{
font-family: Arial, sans-serif;
background:#f0f4f8;
margin:0;
padding:0;
}

header{
background:#005EB8;
color:white;
padding:15px;
text-align:center;
}

main{
padding:30px;
max-width:1200px;
margin:auto;
}

#dropArea{
background:white;
border:2px dashed #0072CE;
padding:40px;
text-align:center;
border-radius:10px;
cursor:pointer;
}

#fileSelect{
background:#0072CE;
color:white;
border:none;
padding:10px 20px;
border-radius:5px;
cursor:pointer;
margin-top:10px;
}

#gallery{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
gap:20px;
margin-top:30px;
}

.image-container{
background:white;
padding:10px;
border-radius:10px;
box-shadow:0 4px 6px rgba(0,0,0,0.1);
}

.image-container img{
width:100%;
}

.image-label{
text-align:center;
margin-top:5px;
font-weight:bold;
}

#results{
margin-top:40px;
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 4px 6px rgba(0,0,0,0.1);
}

#legend{
margin-top:30px;
background:white;
padding:20px;
border-radius:10px;
}

</style>
</head>

<body>

<header>
<h1>X-Ray Bone Fracture Detection System</h1>
</header>

<main>

<div id="dropArea">

<p>Drag & Drop X-ray Image Here</p>

<button id="fileSelect">Select Image</button>

<input type="file" id="fileElem" accept="image/*" style="display:none">

</div>


<div id="gallery"></div>


<div id="results">

<h2>Diagnosis Report</h2>

<h3>Recovery Advice</h3>
<p id="recovery"></p>

<h3>Estimated Recovery Time</h3>
<p id="time"></p>

<h3>Food Recommendation</h3>
<p id="food"></p>

</div>


<div id="legend">

<h2>Detected Fracture Types</h2>

<ul id="legendList"></ul>

</div>

</main>

<script src="script.js"></script>

</body>
</html>
